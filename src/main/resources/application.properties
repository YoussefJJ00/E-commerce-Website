spring.application.name=Projet_Ecomerce_Back
spring.datasource.url = jdbc:mysql://localhost:3306/formation_db?createDatabaseIfNotExist=true

# Username and password
spring.datasource.username = root
spring.datasource.password =

# Keep the connection alive if idle for a long time (needed in production)
spring.datasource.testWhileIdle = true
spring.datasource.validationQuery = SELECT 1
server.port=8085
# ===============================
# = JPA / HIBERNATE
# ===============================

# Use spring.jpa.properties.* for Hibernate native properties (the prefix is
# stripped before adding them to the entity manager).
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# Show or not log for each sql query
spring.jpa.show-sql = true

logging.level.org.hibernate.orm.jdbc.bind=trace

# Hibernate ddl auto (create, create-drop, update): with "update" the database
# schema will be automatically updated accordingly to java entities found in
# the project
spring.jpa.hibernate.ddl-auto = update
#create juste pour la pre1 fois et apr�s nous allons la changer par update
# Naming strategy
spring.jpa.hibernate.naming-strategy = org.hibernate.cfg.ImprovedNamingStrategy


# Allows Hibernate to generate SQL optimized for a particular DBMS
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# si probleme create table hibernate supprimer cet ligne
spring.sql.init.mode=never

