<body>
  <main class="signup-container">
    <!-- Navbar -->
    <app-header></app-header>
    <!-- End Navbar -->
    <div class="signup-box">
      <div class="signup-header">
        <div>
          <h3>Sign Up</h3>
        </div>
      </div>
      <div class="signup-form">
        <form role="form" [formGroup]="form" (ngSubmit)="creation()" enctype="multipart/form-data">
          <label>Name</label>
          <div class="input-group">
            <input type="text" formControlName="username" />
          </div>
          <label>Email</label>
          <div class="input-group">
            <input type="email" formControlName="email" />
          </div>
          <label>Phone</label>
          <div class="input-group">
            <input type="text" formControlName="phone" />
          </div>
          <label>Password</label>
          <div class="input-group">
            <input type="password" formControlName="password" />
          </div>
          <label>Picture</label>
          <div class="input-group">
            <input type="file" name="file" (change)="handleFileInput($event)" />
          </div>
          <div class="button-group">
            <button type="submit" class="btn-signup">Sign Up</button>
            <p id="ntf">Please sign in if you already have an account</p>
            <button type="button" class="btn-login" (click)="login()">Login</button>
          </div>
        </form>
      </div>
    </div>
    <app-footer></app-footer>
  </main>
</body>
